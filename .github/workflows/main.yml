name: Test Notebook Environment
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-pip-environment:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10']
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Verify imports
        run: |
          python -c "import numpy, pandas, networkx, matplotlib.pyplot, seaborn, PIL, openpyxl, jupyter; print('All imports successful')"
      - name: Verify data files
        run: |
          test -f "NbCrVWZr_dataset_1.xlsx" && echo "✓ Excel file found"
          test -f "nimplex_GF_5_20_nodes.npy" && echo "✓ Nodes file found"
          test -f "nimplex_GF_5_20_neighbors.npy" && echo "✓ Neighbors file found"

  test-conda-environment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: conda-incubator/setup-miniconda@v2
        with:
          activate-environment: cga-analysis
          environment-file: environment.yml
      - name: Verify conda imports
        shell: bash -l {0}
        run: python -c "import numpy, pandas, networkx, matplotlib.pyplot, seaborn, PIL, openpyxl, jupyter; print('All conda imports successful')"
